<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KNULL | Internal Portal</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { border: 2px solid #fff; padding: 40px; text-align: center; width: 350px; }
        input { display: block; width: 100%; margin: 15px 0; background: #000; border: 1px solid #fff; color: #fff; padding: 10px; box-sizing: border-box; }
        button { width: 100%; background: #fff; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>KNULL_SYSTEM_v1.0</h2>
        <div id="login-box">
            <input type="text" id="username" placeholder="Username (guest)">
            <input type="password" id="password" placeholder="Password (guest123)">
            <button onclick="login()">AUTHENTICATE</button>
        </div>
        <div id="portal-box" style="display: none;">
            <h3>Welcome: <span id="display-user"></span></h3>
            <p id="access-msg">ACCESS_LEVEL: RESTRICTED</p>
            <div id="flag-section" style="display: none;">
                <p style="border: 1px dashed #fff; padding: 15px; margin-top: 20px;">FLAG: PSNACET{W3bee3y_N4mmat44aan}</p>
            </div>
            <button onclick="logout()" style="margin-top: 20px; background: #555; color: #fff;">DISCONNECT</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
